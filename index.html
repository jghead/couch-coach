<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gridiron Gambit — Power-Up Fantasy Prototype</title>
<style>
  :root {
    --bg: #0b1020;
    --panel: #141b33;
    --panel2: #1b2444;
    --line: #2a3566;
    --txt: #e8ecf8;
    --muted: #8b97c4;
    --you: #34d399;
    --opp: #f87171;
    --gold: #fbbf24;
    --ice: #60a5fa;
    --boost: #c084fc;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #1a2347 0%, var(--bg) 60%);
    color: var(--txt);
    padding: 16px;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }
  h1 {
    font-size: 22px; margin: 0 0 2px; letter-spacing: 0.5px;
    display: flex; align-items: center; gap: 10px;
  }
  .tag { font-size: 11px; color: var(--muted); margin: 0 0 14px; }

  /* Scoreboard */
  .scoreboard {
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
    background: linear-gradient(180deg, var(--panel2), var(--panel));
    border: 1px solid var(--line); border-radius: 16px; padding: 16px 22px; margin-bottom: 16px;
  }
  .team-score { text-align: center; }
  .team-score .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .team-score .pts { font-size: 46px; font-weight: 800; line-height: 1; margin-top: 4px; }
  .you .pts { color: var(--you); }
  .opp .pts { color: var(--opp); }
  .clock { text-align: center; padding: 0 24px; }
  .clock .q { font-size: 13px; color: var(--gold); font-weight: 700; letter-spacing: 1px; }
  .clock .time { font-size: 30px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .clock .status { font-size: 11px; color: var(--muted); margin-top: 2px; min-height: 14px; }

  .controls { display: flex; gap: 10px; margin-bottom: 18px; }
  button.ctl {
    background: var(--panel2); color: var(--txt); border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 18px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  button.ctl:hover { border-color: var(--gold); }
  button.ctl.primary { background: var(--gold); color: #1a1300; border-color: var(--gold); }

  /* Power-up tray */
  .tray { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 18px; }
  .pu {
    position: relative; background: var(--panel); border: 1px solid var(--line);
    border-radius: 14px; padding: 14px; cursor: pointer; overflow: hidden; transition: transform .08s;
  }
  .pu:hover:not(.disabled) { transform: translateY(-2px); }
  .pu.armed { box-shadow: 0 0 0 2px var(--gold) inset; }
  .pu.disabled { opacity: 0.45; cursor: not-allowed; }
  .pu .name { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px; }
  .pu .desc { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.4; }
  .pu .meta { font-size: 11px; margin-top: 10px; display: flex; justify-content: space-between; }
  .pu .charges { color: var(--gold); font-weight: 700; }
  .pu .cooldownbar {
    position: absolute; left: 0; bottom: 0; height: 4px; background: var(--ice); width: 0%;
  }
  .icon { font-size: 18px; }

  /* Rosters */
  .field { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .roster { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 12px; }
  .roster h2 { font-size: 14px; margin: 4px 6px 12px; text-transform: uppercase; letter-spacing: 1px; }
  .roster.you h2 { color: var(--you); }
  .roster.opp h2 { color: var(--opp); }
  .player {
    display: grid; grid-template-columns: 38px 1fr auto; align-items: center; gap: 10px;
    background: var(--panel2); border: 1px solid transparent; border-radius: 10px;
    padding: 9px 12px; margin-bottom: 8px; transition: border-color .1s;
  }
  .player.targetable { cursor: pointer; border-color: var(--gold); }
  .player.targetable:hover { background: #232e57; }
  .pos { font-size: 11px; font-weight: 800; color: var(--muted); background: #0d1dense; text-align: center;
         background: #0d142b; border-radius: 6px; padding: 5px 0; }
  .pname { font-weight: 600; font-size: 14px; }
  .pstate { font-size: 10px; color: var(--muted); min-height: 12px; }
  .ppts { font-size: 20px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .player.frozen { opacity: 0.55; }
  .player.frozen .pstate { color: var(--ice); }
  .player.boosted { box-shadow: 0 0 0 1px var(--boost) inset; }
  .player.boosted .pstate { color: var(--boost); }
  .badge { font-size: 14px; margin-left: 4px; }

  /* Feed */
  .feed {
    margin-top: 16px; background: var(--panel); border: 1px solid var(--line);
    border-radius: 14px; padding: 12px 16px; height: 150px; overflow-y: auto; font-size: 13px;
  }
  .feed h2 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin: 0 0 8px; }
  .feed .line { padding: 3px 0; border-bottom: 1px solid #1a2244; }
  .feed .line .t { color: var(--muted); font-variant-numeric: tabular-nums; margin-right: 8px; }
  .feed .ev-score { color: var(--txt); }
  .feed .ev-pu { color: var(--gold); font-weight: 600; }
  .hint { font-size: 12px; color: var(--gold); min-height: 16px; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🏈 Gridiron Gambit <span style="font-size:11px;color:var(--muted);font-weight:400;">power-up fantasy · prototype</span></h1>
  <p class="tag">Simulated game — no real NFL data. Built to test whether the power-up gameplay feels fun. Speed up / pause anytime.</p>

  <div class="scoreboard">
    <div class="team-score you"><div class="label">Your Team</div><div class="pts" id="youScore">0.0</div></div>
    <div class="clock">
      <div class="q" id="quarter">PRE-GAME</div>
      <div class="time" id="gameClock">15:00</div>
      <div class="status" id="clockStatus">Press Kick Off to start</div>
    </div>
    <div class="team-score opp"><div class="label">Opponent</div><div class="pts" id="oppScore">0.0</div></div>
  </div>

  <div class="controls">
    <button class="ctl primary" id="startBtn">▶ Kick Off</button>
    <button class="ctl" id="speedBtn">⏩ Speed: 1x</button>
    <button class="ctl" id="resetBtn">↺ Reset</button>
  </div>

  <div class="hint" id="hint">&nbsp;</div>

  <div class="tray" id="tray"></div>

  <div class="field">
    <div class="roster you"><h2>Your Lineup</h2><div id="youRoster"></div></div>
    <div class="roster opp"><h2>Opponent Lineup</h2><div id="oppRoster"></div></div>
  </div>

  <div class="feed">
    <h2>Live Feed</h2>
    <div id="feedLines"></div>
  </div>
</div>

<script>
// ---------- Game config ----------
const QUARTER_SECONDS = 15 * 60;       // 15:00 per quarter (game time)
const TICKS_PER_SECOND_BASE = 20;      // game-seconds advanced per real second at 1x
const TICK_MS = 250;                   // real-world tick interval

// Power-up durations are in GAME seconds
const POWERUPS = {
  double:  { name: "Double Points", icon: "⚡", target: "you", dur: 120, charges: 2, cd: 90,
             desc: "Your player scores 2× for 2 game-minutes. Pick the guy about to pop." },
  freeze:  { name: "Freeze Player", icon: "🧊", target: "opp", dur: 60,  charges: 1, cd: 90,
             desc: "An opponent's player earns ZERO points for 1 game-minute. Shut down their stud." },
  surge:   { name: "Hail Mary",     icon: "🚀", target: "you", dur: 45,  charges: 1, cd: 0,
             desc: "Your player scores 3× for 45s — but loses 5 pts if they don't score. Big risk." },
  shield:  { name: "Bodyguard",     icon: "🛡️", target: "you", dur: 180, charges: 1, cd: 0,
             desc: "Your player is immune to Freeze & Pickpocket for 3 game-minutes. Protect your star." },
  steal:   { name: "Pickpocket",    icon: "🧲", target: "opp", dur: 90,  charges: 1, cd: 120,
             desc: "For 90s, half of an opponent's points are stolen and added to YOUR team. Heist time." },
  floor:   { name: "Sure Thing",    icon: "🎯", target: "you", dur: 60,  charges: 1, cd: 90,
             desc: "Your player scores steady, guaranteed points every play for 1 minute. Safe & reliable." },
};

const POSITIONS = {
  QB: { rate: 0.55, min: 0.4, max: 5.5 },
  RB: { rate: 0.40, min: 0.3, max: 4.0 },
  WR: { rate: 0.38, min: 0.3, max: 6.0 },
  TE: { rate: 0.28, min: 0.2, max: 3.5 },
  K:  { rate: 0.15, min: 1.0, max: 3.0 },
};

function makeRoster(names) {
  return names.map((n, i) => ({
    id: n.id, name: n.name, pos: n.pos,
    pts: 0, frozen: 0, boosted: 0, boostMult: 1, hailmary: false,
    shielded: 0, pickpocketed: 0, floored: 0,
  }));
}

const YOU_NAMES = [
  { id: "y0", name: "J. Burrow",   pos: "QB" },
  { id: "y1", name: "B. Robinson", pos: "RB" },
  { id: "y2", name: "A. St. Brown",pos: "WR" },
  { id: "y3", name: "T. McBride",  pos: "TE" },
  { id: "y4", name: "H. Butker",   pos: "K"  },
];
const OPP_NAMES = [
  { id: "o0", name: "P. Mahomes",  pos: "QB" },
  { id: "o1", name: "S. Barkley",  pos: "RB" },
  { id: "o2", name: "J. Jefferson",pos: "WR" },
  { id: "o3", name: "G. Kittle",   pos: "TE" },
  { id: "o4", name: "J. Tucker",   pos: "K"  },
];

// ---------- State ----------
let state;
function freshState() {
  return {
    running: false,
    speed: 1,
    gameSec: 0,                 // 0 .. 3600
    you: makeRoster(YOU_NAMES),
    opp: makeRoster(OPP_NAMES),
    pu: Object.fromEntries(Object.entries(POWERUPS).map(([k, v]) => [k, { charges: v.charges, cd: 0 }])),
    armed: null,
    feed: [],
  };
}

// ---------- Helpers ----------
const $ = (id) => document.getElementById(id);
const teamArr = (side) => (side === "you" ? state.you : state.opp);
const findPlayer = (pid) => [...state.you, ...state.opp].find((p) => p.id === pid);
function fmtClock(remaining) {
  const m = Math.floor(remaining / 60);
  const s = Math.floor(remaining % 60);
  return `${m}:${s.toString().padStart(2, "0")}`;
}
function gameClockLabel() {
  const q = Math.min(3, Math.floor(state.gameSec / QUARTER_SECONDS));
  const into = state.gameSec - q * QUARTER_SECONDS;
  const remaining = Math.max(0, QUARTER_SECONDS - into);
  return { q: q + 1, remaining };
}
function pushFeed(text, cls) {
  const { q, remaining } = gameClockLabel();
  state.feed.unshift({ t: `Q${q} ${fmtClock(remaining)}`, text, cls });
  state.feed = state.feed.slice(0, 60);
}

// ---------- Simulation ----------
function tick() {
  if (!state.running) return;
  const adv = TICKS_PER_SECOND_BASE * state.speed * (TICK_MS / 1000);
  const prevSec = state.gameSec;
  state.gameSec = Math.min(4 * QUARTER_SECONDS, state.gameSec + adv);

  // quarter change announce
  if (Math.floor(prevSec / QUARTER_SECONDS) !== Math.floor(state.gameSec / QUARTER_SECONDS)
      && state.gameSec < 4 * QUARTER_SECONDS) {
    pushFeed(`— End of Q${Math.floor(state.gameSec / QUARTER_SECONDS)} —`, "ev-score");
  }

  // decay timers (in game seconds)
  [...state.you, ...state.opp].forEach((p) => {
    if (p.frozen > 0) { p.frozen = Math.max(0, p.frozen - adv); if (p.frozen === 0) { pushFeed(`${p.name} is back in play.`, "ev-pu"); } }
    if (p.boosted > 0) {
      p.boosted = Math.max(0, p.boosted - adv);
      if (p.boosted === 0) {
        if (p.hailmary && p.pendingScore === false) { p.pts = Math.max(0, p.pts - 5); pushFeed(`Hail Mary fizzled — ${p.name} -5 pts.`, "ev-pu"); }
        p.boostMult = 1; p.hailmary = false; p.pendingScore = undefined;
        pushFeed(`Boost expired on ${p.name}.`, "ev-pu");
      }
    }
    if (p.shielded > 0) { p.shielded = Math.max(0, p.shielded - adv); if (p.shielded === 0) pushFeed(`${p.name}'s Bodyguard clocks out.`, "ev-pu"); }
    if (p.pickpocketed > 0) { p.pickpocketed = Math.max(0, p.pickpocketed - adv); if (p.pickpocketed === 0) pushFeed(`Pickpocket on ${p.name} ended.`, "ev-pu"); }
    if (p.floored > 0) p.floored = Math.max(0, p.floored - adv);
  });
  Object.values(state.pu).forEach((p) => { if (p.cd > 0) p.cd = Math.max(0, p.cd - adv); });

  // scoring chances
  const dtSeconds = adv;
  [...state.you, ...state.opp].forEach((p) => {
    if (p.frozen > 0) return;
    const cfg = POSITIONS[p.pos];
    // Sure Thing forces reliable scoring; otherwise normal per-tick chance
    const chance = p.floored > 0 ? 1 : cfg.rate * (dtSeconds / 30);
    if (Math.random() < chance) {
      let gain = p.floored > 0
        ? cfg.min + Math.random() * (cfg.max - cfg.min) * 0.4   // steady, modest
        : cfg.min + Math.random() * (cfg.max - cfg.min);
      gain *= p.boostMult;
      gain = Math.round(gain * 10) / 10;

      // Pickpocket: opponent loses half, your team grabs it
      let stolen = 0;
      if (p.pickpocketed > 0 && state.opp.includes(p)) {
        stolen = Math.round((gain / 2) * 10) / 10;
        gain = Math.round((gain - stolen) * 10) / 10;
        const thief = teamArr("you").reduce((a, b) => (b.pts >= a.pts ? b : a));
        thief.pts = Math.round((thief.pts + stolen) * 10) / 10;
      }

      p.pts = Math.round((p.pts + gain) * 10) / 10;
      if (p.hailmary) p.pendingScore = true;
      const mult = p.boostMult > 1 ? ` (${p.boostMult}×!)` : "";
      const floorTag = p.floored > 0 ? " 🎯" : "";
      pushFeed(`${p.name} +${gain}${mult}${floorTag}`, "ev-score");
      if (stolen > 0) pushFeed(`🧲 Pickpocket! +${stolen} swiped from ${p.name}.`, "ev-pu");
    }
  });

  if (state.gameSec >= 4 * QUARTER_SECONDS) {
    state.running = false;
    const ys = teamTotal("you"), os = teamTotal("opp");
    const verdict = ys > os ? "🏆 You WIN!" : ys < os ? "💀 You lose." : "🤝 Tie game.";
    pushFeed(`FINAL — ${verdict}`, "ev-pu");
  }
  render();
}

function teamTotal(side) {
  return Math.round(teamArr(side).reduce((a, p) => a + p.pts, 0) * 10) / 10;
}

// ---------- Power-ups ----------
function armPowerup(key) {
  const cfg = POWERUPS[key], st = state.pu[key];
  if (st.charges <= 0 || st.cd > 0 || !state.running) return;
  state.armed = state.armed === key ? null : key;
  render();
}

function applyPowerup(key, player) {
  const cfg = POWERUPS[key], st = state.pu[key];

  // Bodyguard blocks the two hostile power-ups
  if ((key === "freeze" || key === "steal") && player.shielded > 0) {
    st.charges -= 1; st.cd = cfg.cd; state.armed = null;
    pushFeed(`🛡️ ${player.name}'s Bodyguard blocked your ${cfg.name}!`, "ev-pu");
    render();
    return;
  }

  st.charges -= 1; st.cd = cfg.cd; state.armed = null;
  if (key === "freeze") {
    player.frozen = cfg.dur;
    pushFeed(`🧊 You FROZE ${player.name} for 1:00!`, "ev-pu");
  } else if (key === "double") {
    player.boosted = cfg.dur; player.boostMult = 2;
    pushFeed(`⚡ Double Points on ${player.name}!`, "ev-pu");
  } else if (key === "surge") {
    player.boosted = cfg.dur; player.boostMult = 3; player.hailmary = true; player.pendingScore = false;
    pushFeed(`🚀 Hail Mary! ${player.name} at 3× — boom or bust.`, "ev-pu");
  } else if (key === "shield") {
    player.shielded = cfg.dur;
    pushFeed(`🛡️ Bodyguard on ${player.name} — frost-proof for 3:00.`, "ev-pu");
  } else if (key === "steal") {
    player.pickpocketed = cfg.dur;
    pushFeed(`🧲 Pickpocket active on ${player.name} — start lifting points!`, "ev-pu");
  } else if (key === "floor") {
    player.floored = cfg.dur;
    pushFeed(`🎯 Sure Thing on ${player.name} — steady points incoming.`, "ev-pu");
  }
  render();
}

function onPlayerClick(pid) {
  if (!state.armed) return;
  const cfg = POWERUPS[state.armed];
  const player = findPlayer(pid);
  const side = state.you.includes(player) ? "you" : "opp";
  if (side !== cfg.target) {
    $("hint").textContent = cfg.target === "you" ? "That power-up targets YOUR players." : "That power-up targets the OPPONENT's players.";
    return;
  }
  applyPowerup(state.armed, player);
  $("hint").textContent = "";
}

// ---------- Render ----------
function render() {
  $("youScore").textContent = teamTotal("you").toFixed(1);
  $("oppScore").textContent = teamTotal("opp").toFixed(1);
  const { q, remaining } = gameClockLabel();
  const done = state.gameSec >= 4 * QUARTER_SECONDS;
  $("quarter").textContent = state.gameSec === 0 && !state.running ? "PRE-GAME" : done ? "FINAL" : `QUARTER ${q}`;
  $("gameClock").textContent = done ? "0:00" : fmtClock(remaining);
  $("clockStatus").textContent = done ? "Game over — Reset to replay"
    : state.running ? (state.armed ? "⚠ Pick a target player" : "Live") : "Paused";

  // tray
  $("tray").innerHTML = "";
  Object.entries(POWERUPS).forEach(([key, cfg]) => {
    const st = state.pu[key];
    const disabled = st.charges <= 0 || st.cd > 0 || !state.running;
    const div = document.createElement("div");
    div.className = "pu" + (state.armed === key ? " armed" : "") + (disabled ? " disabled" : "");
    const cdPct = cfg.cd > 0 ? (st.cd / cfg.cd) * 100 : 0;
    div.innerHTML = `
      <div class="name"><span class="icon">${cfg.icon}</span>${cfg.name}</div>
      <div class="desc">${cfg.desc}</div>
      <div class="meta">
        <span class="charges">${st.charges} left</span>
        <span style="color:var(--muted)">${st.cd > 0 ? "cooldown " + Math.ceil(st.cd) + "s" : (st.charges>0?"ready":"used up")}</span>
      </div>
      <div class="cooldownbar" style="width:${cdPct}%"></div>`;
    div.onclick = () => armPowerup(key);
    $("tray").appendChild(div);
  });

  renderRoster("you", "youRoster");
  renderRoster("opp", "oppRoster");
  renderFeed();
}

function renderRoster(side, containerId) {
  const armedCfg = state.armed ? POWERUPS[state.armed] : null;
  const targetable = armedCfg && armedCfg.target === side;
  const c = $(containerId); c.innerHTML = "";
  teamArr(side).forEach((p) => {
    const div = document.createElement("div");
    let cls = "player";
    if (p.frozen > 0) cls += " frozen";
    if (p.boosted > 0) cls += " boosted";
    if (targetable) cls += " targetable";
    div.className = cls;
    const fx = [];
    if (p.frozen > 0)      fx.push(`🧊 frozen ${fmtClock(p.frozen)}`);
    if (p.boosted > 0)     fx.push(`${p.hailmary ? "🚀 3×" : "⚡ 2×"} ${fmtClock(p.boosted)}`);
    if (p.floored > 0)     fx.push(`🎯 sure ${fmtClock(p.floored)}`);
    if (p.shielded > 0)    fx.push(`🛡️ ${fmtClock(p.shielded)}`);
    if (p.pickpocketed > 0) fx.push(`🧲 robbed ${fmtClock(p.pickpocketed)}`);
    const state_txt = fx.join(" · ");
    const badge = [p.frozen > 0 ? "🧊" : "", p.shielded > 0 ? "🛡️" : "",
                   p.boosted > 0 ? (p.hailmary ? "🚀" : "⚡") : "", p.floored > 0 ? "🎯" : "",
                   p.pickpocketed > 0 ? "🧲" : ""].join("");
    div.innerHTML = `
      <div class="pos">${p.pos}</div>
      <div>
        <div class="pname">${p.name}<span class="badge">${badge}</span></div>
        <div class="pstate">${state_txt}</div>
      </div>
      <div class="ppts">${p.pts.toFixed(1)}</div>`;
    if (targetable) div.onclick = () => onPlayerClick(p.id);
    c.appendChild(div);
  });
}

function renderFeed() {
  const c = $("feedLines"); c.innerHTML = "";
  state.feed.forEach((f) => {
    const d = document.createElement("div");
    d.className = "line";
    d.innerHTML = `<span class="t">${f.t}</span><span class="${f.cls}">${f.text}</span>`;
    c.appendChild(d);
  });
}

// ---------- Controls ----------
$("startBtn").onclick = () => {
  if (state.gameSec >= 4 * QUARTER_SECONDS) return;
  state.running = !state.running;
  $("startBtn").textContent = state.running ? "⏸ Pause" : "▶ Resume";
  if (state.running && state.gameSec === 0) pushFeed("Kickoff! Game is live.", "ev-pu");
  render();
};
$("speedBtn").onclick = () => {
  const speeds = [1, 2, 4];
  state.speed = speeds[(speeds.indexOf(state.speed) + 1) % speeds.length];
  $("speedBtn").textContent = `⏩ Speed: ${state.speed}x`;
};
$("resetBtn").onclick = () => {
  state = freshState();
  $("startBtn").textContent = "▶ Kick Off";
  $("hint").textContent = "";
  render();
};

// ---------- Boot ----------
state = freshState();
render();
setInterval(tick, TICK_MS);
</script>
</body>
</html>
